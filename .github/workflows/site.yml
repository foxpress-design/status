name: Deploy Status Page
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "status-page/**"

jobs:
  deploy:
    name: Deploy custom status page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "status-page/"
          force_orphan: true
          cname: status.foxpress.cloud
          user_name: "foxpress-bot"
          user_email: "bot@foxpress.cloud"
